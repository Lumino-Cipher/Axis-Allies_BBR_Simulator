<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Random Flag Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 12px;
            color: white;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 250px;
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .upload-btn {
            display: inline-block;
            padding: 10px 15px;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            width: calc(100% - 30px);
            margin-bottom: 15px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .upload-btn:hover { background: #2980b9; }
        #imageInput { display: none; }
    </style>
</head>
<body>

<div id="ui-container">
    <label class="upload-btn" for="imageInput">Upload Flag Image</label>
    <input type="file" id="imageInput" accept="image/*">

    <div class="control-group">
        <label>Wind Speed</label>
        <input type="range" id="speed" min="0.1" max="5.0" step="0.1" value="1.5">
    </div>
    <div class="control-group">
        <label>Wave Intensity</label>
        <input type="range" id="amplitude" min="0.05" max="1.0" step="0.05" value="0.3">
    </div>
    <div class="control-group">
        <label>Shadow Depth</label>
        <input type="range" id="shadowStr" min="0.0" max="1.5" step="0.1" value="0.8">
    </div>
    <div class="control-group">
        <label>Chaos (Randomness)</label>
        <input type="range" id="chaos" min="0.1" max="3.0" step="0.1" value="1.0">
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- Shader Source ---
    const _VS = `
        varying vec2 vUv;
        varying float vNoise;
        uniform float uTime;
        uniform float uSpeed;
        uniform float uAmplitude;
        uniform float uChaos;

        // Simple Noise Function
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
        float snoise(vec2 v) {
            const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
            vec2 i  = floor(v + dot(v, C.yy) );
            vec2 x0 = v -   i + dot(i, C.xx);
            vec2 i1;
            i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;
            i = mod289(i);
            vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
            m = m*m ; m = m*m ;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;
            m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
            vec3 g;
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }

        void main() {
            vUv = uv;
            float t = uTime * uSpeed;
            
            // Complicated wave: Combine two sine waves and noise
            float noise = snoise(vec2(uv.x * 2.0 * uChaos, uv.y * uChaos + t));
            vNoise = noise;

            vec3 newPos = position;
            newPos.z += sin(uv.x * 5.0 + t) * uAmplitude;
            newPos.z += noise * (uAmplitude * 0.5);
            newPos.z += sin(uv.y * 3.0 + t * 0.5) * (uAmplitude * 0.2);

            gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
        }
    `;

    const _FS = `
        varying vec2 vUv;
        varying float vNoise;
        uniform sampler2D uTexture;
        uniform float uTime;
        uniform float uShadowStr;

        void main() {
            vec4 tex = texture2D(uTexture, vUv);
            
            // Random Shadows: using noise to create dark/light patches
            // vNoise comes from the vertex shader for consistency, but we modify it
            float shadow = vNoise * 0.5 + 0.5; 
            shadow = pow(shadow, 2.0); // Sharpen the shadows
            
            // Apply randomized darkening/lightening
            vec3 color = tex.rgb;
            color *= (1.0 - (1.0 - shadow) * uShadowStr);
            
            // Add a slight brightness variation for "lighter" spots
            color += (vNoise * 0.1) * uShadowStr;

            gl_FragColor = vec4(color, 1.0);
        }
    `;

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Initial Texture (Placeholder)
    const loader = new THREE.TextureLoader();
    let flagTexture = loader.load('https://threejs.org/examples/textures/uv_grid_opengl.jpg');

    // Flag Geometry (High segment count for smooth curves)
    const geometry = new THREE.PlaneGeometry(10, 6, 100, 100);
    const material = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0 },
            uTexture: { value: flagTexture },
            uSpeed: { value: 1.5 },
            uAmplitude: { value: 0.3 },
            uShadowStr: { value: 0.8 },
            uChaos: { value: 1.0 }
        },
        vertexShader: _VS,
        fragmentShader: _FS,
        side: THREE.DoubleSide
    });

    const flag = new THREE.Mesh(geometry, material);
    scene.add(flag);
    camera.position.z = 8;

    // --- Controls Logic ---
    const inputs = {
        speed: document.getElementById('speed'),
        amplitude: document.getElementById('amplitude'),
        shadowStr: document.getElementById('shadowStr'),
        chaos: document.getElementById('chaos'),
        image: document.getElementById('imageInput')
    };

    inputs.image.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const newTex = new THREE.Texture(img);
                    newTex.needsUpdate = true;
                    material.uniforms.uTexture.value = newTex;
                };
            };
            reader.readAsDataURL(file);
        }
    });

    // --- Animation Loop ---
    const clock = new THREE.Clock();
    function animate() {
        const elapsed = clock.getElapsedTime();
        
        // Update uniforms from UI
        material.uniforms.uTime.value = elapsed;
        material.uniforms.uSpeed.value = parseFloat(inputs.speed.value);
        material.uniforms.uAmplitude.value = parseFloat(inputs.amplitude.value);
        material.uniforms.uShadowStr.value = parseFloat(inputs.shadowStr.value);
        material.uniforms.uChaos.value = parseFloat(inputs.chaos.value);

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>

</body>
</html>
